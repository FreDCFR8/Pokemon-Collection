name: Refactor catalog page chrome

on:
  push:
    branches:
      - agent/sets-v2-overview
    paths:
      - .github/catalog-page-refactor-trigger

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node .github/scripts/refactor-catalog-pages.mjs
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build
      - name: Commit clean refactor
        run: |
          rm -f .github/catalog-page-refactor-trigger
          rm -f .github/scripts/refactor-catalog-pages.mjs
          rm -f .github/workflows/refactor-catalog-pages.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Share catalog page header and filters"
          git push
