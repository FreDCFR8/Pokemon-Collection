template: bugfix
profile: bugfix

required_input:
  task: Beschrijf fout, verwacht gedrag en relevante evidence.

optional_input:
  reproduction: Bekende reproduceerstappen.
  scope: Alleen taak-specifieke grenzen.
  acceptance: Unieke regressiecriteria.
  overrides: Alleen expliciet goedgekeurde afwijkingen.

example:
  repository: FreDCFR8/Pokemon-Collection
  entrypoint: docs/00_CODEX_ENTRYPOINT.md
  template: bugfix
  task: Herstel de bevestigde fout zonder ander gedrag te wijzigen.
